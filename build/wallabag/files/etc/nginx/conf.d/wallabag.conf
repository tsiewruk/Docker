server_tokens off;

server {
    listen  80  default_server;
    server_name localhost;
    #<INSERT_SSL_HERE> - depends on your setup, usually ssl is configured in http-proxy

    root            <DOCUMENT_ROOT>;
    index           index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~* \.php($|/) {
        include include.d/php.conf;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
}
